<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AR Modell</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <!-- CSS Datei einbinden -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<model-viewer
    src="bartest.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    class="viewer">

</model-viewer>

</body>
</html>
